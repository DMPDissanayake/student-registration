name: student_registration
description: "A new Flutter project."
publish_to: 'none' 
version: 1.0.0+1

environment:
  sdk: ^3.10.3

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  flutter_bloc: ^8.1.6
  get_it: ^7.7.0
  injectable: ^2.5.0
  go_router: ^14.2.1
  firebase_core: ^3.1.1
  firebase_auth: ^5.1.1
  cloud_firestore: ^5.0.2
  dartz: ^0.10.1
  equatable: ^2.0.5
  intl: ^0.20.2
  flutter_screenutil: ^5.9.3
  country_code_picker: ^3.4.1
  intl_phone_field: ^3.2.0
  lottie: ^3.3.3
  currency_text_input_formatter: ^2.3.0
  svg_flutter: ^0.0.1
  cached_network_image: ^3.4.1
  shimmer: ^3.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  injectable_generator: ^2.6.2
  build_runner: ^2.4.11
  flutter_native_splash: ^2.4.1 #

flutter_icons:
  android: "launcher_icon"
  ios: true
  remove_alpha_ios: true
  image_path: "images/png/png_app_logo.png"
  min_sdk_android: 21 

flutter_native_splash:
  color: "#ffffff" # 
  image: images/png/png_app_logo2.png
  
  android_12:
    image: images/png/png_app_logo2.png
    color: "#ffffff"
    icon_background_color: "#ffffff" 

  android: true
  ios: true
  android_gravity: center
  ios_content_mode: center
  fullscreen: true

flutter:
  generate: false
  uses-material-design: true
  assets:
    - images/svg/
    - images/png/
    - images/animation/
  
